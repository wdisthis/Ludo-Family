<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <!-- Background Base -->
  <rect x="0" y="0" width="600" height="600" fill="#ffffff" stroke="#1e293b" stroke-width="4"/>

  <!-- Full Track Grid Cells -->
  <!-- Top Grid Group (Yellow Path - Rich Amber Brown Strokes) -->
  <g fill="#ffffff" stroke="#78350f" stroke-width="1.5">
    <rect x="240" y="0" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="0" width="40" height="40" fill="#ffffff"/>
    <rect x="320" y="0" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="40" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="40" width="40" height="40" fill="#ffcc00"/>
    <rect x="320" y="40" width="40" height="40" fill="#ffcc00"/>
    <rect x="240" y="80" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="80" width="40" height="40" fill="#ffcc00"/>
    <rect x="320" y="80" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="120" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="120" width="40" height="40" fill="#ffcc00"/>
    <rect x="320" y="120" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="160" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="160" width="40" height="40" fill="#ffcc00"/>
    <rect x="320" y="160" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="200" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="200" width="40" height="40" fill="#ffcc00"/>
    <rect x="320" y="200" width="40" height="40" fill="#ffffff"/>
  </g>

  <!-- Left Grid Group (Green Path - Deep Forest Green Strokes) -->
  <g fill="#ffffff" stroke="#14532d" stroke-width="1.5">
    <rect x="0" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="40" y="240" width="40" height="40" fill="#2ecc71"/>
    <rect x="80" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="120" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="160" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="200" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="0" y="280" width="40" height="40" fill="#ffffff"/>
    <rect x="40" y="280" width="40" height="40" fill="#2ecc71"/>
    <rect x="80" y="280" width="40" height="40" fill="#2ecc71"/>
    <rect x="120" y="280" width="40" height="40" fill="#2ecc71"/>
    <rect x="160" y="280" width="40" height="40" fill="#2ecc71"/>
    <rect x="200" y="280" width="40" height="40" fill="#2ecc71"/>
    <rect x="0" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="40" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="80" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="120" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="160" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="200" y="320" width="40" height="40" fill="#ffffff"/>
  </g>

  <!-- Bottom Grid Group (Red Path - Rich Maroon Strokes) -->
  <g fill="#ffffff" stroke="#7f1d1d" stroke-width="1.5">
    <rect x="240" y="360" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="360" width="40" height="40" fill="#ff4d4d"/>
    <rect x="320" y="360" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="400" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="400" width="40" height="40" fill="#ff4d4d"/>
    <rect x="320" y="400" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="440" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="440" width="40" height="40" fill="#ff4d4d"/>
    <rect x="320" y="440" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="480" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="480" width="40" height="40" fill="#ff4d4d"/>
    <rect x="320" y="480" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="520" width="40" height="40" fill="#ff4d4d"/>
    <rect x="280" y="520" width="40" height="40" fill="#ff4d4d"/>
    <rect x="320" y="520" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="560" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="560" width="40" height="40" fill="#ffffff"/>
    <rect x="320" y="560" width="40" height="40" fill="#ffffff"/>
  </g>

  <!-- Right Grid Group (Blue Path - Deep Navy Blue Strokes) -->
  <g fill="#ffffff" stroke="#172554" stroke-width="1.5">
    <rect x="360" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="400" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="440" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="480" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="520" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="560" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="360" y="280" width="40" height="40" fill="#3b82f6"/>
    <rect x="400" y="280" width="40" height="40" fill="#3b82f6"/>
    <rect x="440" y="280" width="40" height="40" fill="#3b82f6"/>
    <rect x="480" y="280" width="40" height="40" fill="#3b82f6"/>
    <rect x="520" y="280" width="40" height="40" fill="#3b82f6"/>
    <rect x="560" y="280" width="40" height="40" fill="#ffffff"/>
    <rect x="360" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="400" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="440" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="480" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="520" y="320" width="40" height="40" fill="#3b82f6"/>
    <rect x="560" y="320" width="40" height="40" fill="#ffffff"/>
  </g>

  <!-- Player Bases (Home Yards) -->
  <!-- Green Base (Top-Left) -->
  <g stroke="#14532d" stroke-width="1.5">
    <rect x="0" y="0" width="240" height="240" fill="#2ecc71"/>
    <rect x="40" y="40" width="160" height="160" rx="16" fill="#ffffff"/>
    
    <circle cx="80" cy="80" r="22" fill="#e2e8f0"/>
    <circle cx="80" cy="80" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="160" cy="80" r="22" fill="#e2e8f0"/>
    <circle cx="160" cy="80" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="80" cy="160" r="22" fill="#e2e8f0"/>
    <circle cx="80" cy="160" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="160" cy="160" r="22" fill="#e2e8f0"/>
    <circle cx="160" cy="160" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
  </g>

  <!-- Yellow Base (Top-Right) -->
  <g stroke="#78350f" stroke-width="1.5">
    <rect x="360" y="0" width="240" height="240" fill="#ffcc00"/>
    <rect x="400" y="40" width="160" height="160" rx="16" fill="#ffffff"/>
    
    <circle cx="440" cy="80" r="22" fill="#e2e8f0"/>
    <circle cx="440" cy="80" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="520" cy="80" r="22" fill="#e2e8f0"/>
    <circle cx="520" cy="80" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="440" cy="160" r="22" fill="#e2e8f0"/>
    <circle cx="440" cy="160" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="520" cy="160" r="22" fill="#e2e8f0"/>
    <circle cx="520" cy="160" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
  </g>

  <!-- Red Base (Bottom-Left) -->
  <g stroke="#7f1d1d" stroke-width="1.5">
    <rect x="0" y="360" width="240" height="240" fill="#ff4d4d"/>
    <rect x="40" y="400" width="160" height="160" rx="16" fill="#ffffff"/>
    
    <circle cx="80" cy="440" r="22" fill="#e2e8f0"/>
    <circle cx="80" cy="440" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="160" cy="440" r="22" fill="#e2e8f0"/>
    <circle cx="160" cy="440" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="80" cy="520" r="22" fill="#e2e8f0"/>
    <circle cx="80" cy="520" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="160" cy="520" r="22" fill="#e2e8f0"/>
    <circle cx="160" cy="520" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
  </g>

  <!-- Blue Base (Bottom-Right) -->
  <g stroke="#172554" stroke-width="1.5">
    <rect x="360" y="360" width="240" height="240" fill="#3b82f6"/>
    <rect x="400" y="400" width="160" height="160" rx="16" fill="#ffffff"/>
    
    <circle cx="440" cy="440" r="22" fill="#e2e8f0"/>
    <circle cx="440" cy="440" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="520" cy="440" r="22" fill="#e2e8f0"/>
    <circle cx="520" cy="440" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="440" cy="520" r="22" fill="#e2e8f0"/>
    <circle cx="440" cy="520" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="520" cy="520" r="22" fill="#e2e8f0"/>
    <circle cx="520" cy="520" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
  </g>

  <!-- Center Finished Home Wedge Triangles -->
  <g stroke-width="1.5">
    <polygon points="240,240 300,300 240,360" fill="#2ecc71" stroke="#14532d"/>
    <polygon points="240,240 300,300 360,240" fill="#ffcc00" stroke="#78350f"/>
    <polygon points="360,240 300,300 360,360" fill="#3b82f6" stroke="#172554"/>
    <polygon points="240,360 300,300 360,360" fill="#ff4d4d" stroke="#7f1d1d"/>
  </g>

  <!-- Safe Squares marked with Gilded Star Checkpoints (Inline Shield Polygons for nanosvg support) -->
  <!-- Red Start (6, 13) -->
  <polygon points="248,527 260,530 272,527 272,540 260,553 248,540" fill="#f1f5f9" stroke="#7f1d1d" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Green Start (1, 6) -->
  <polygon points="48,247 60,250 72,247 72,260 60,273 48,260" fill="#f1f5f9" stroke="#14532d" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Yellow Start (8, 1) -->
  <polygon points="328,47 340,50 352,47 352,60 340,73 328,60" fill="#f1f5f9" stroke="#78350f" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Blue Start (13, 8) -->
  <polygon points="528,327 540,330 552,327 552,340 540,353 528,340" fill="#f1f5f9" stroke="#172554" stroke-width="1.5" stroke-linejoin="round"/>
  
  <!-- Neutral Safe Square 1 (2, 8) -->
  <polygon points="88,327 100,330 112,327 112,340 100,353 88,340" fill="#f1f5f9" stroke="#14532d" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Neutral Safe Square 2 (8, 12) -->
  <polygon points="328,487 340,490 352,487 352,500 340,513 328,500" fill="#f1f5f9" stroke="#7f1d1d" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Neutral Safe Square 3 (12, 6) -->
  <polygon points="488,247 500,250 512,247 512,260 500,273 488,260" fill="#f1f5f9" stroke="#172554" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Neutral Safe Square 4 (6, 2) -->
  <polygon points="248,87 260,90 272,87 272,100 260,113 248,100" fill="#f1f5f9" stroke="#78350f" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Thick Outer Border Box -->
  <rect x="0" y="0" width="600" height="600" fill="none" stroke="#1e293b" stroke-width="4"/>
</svg>
